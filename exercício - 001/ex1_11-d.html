<!--

d) Elaborar um programa que leia 2 notas de um aluno em uma disciplina.

Calcule e informe a média das notas.
Exemplo:
1ª Nota: 7.0
2ª Nota: 8.0
Média: 7.5

-->

<script>


var n1 = Number(prompt('Primeira nota: '))
var n2 = Number(prompt('Segunda nota: '))

var m = (n1 + n2) /2

window.alert('Primeira nota: ' + n1 + '\n' + 'Segunda nota: ' + n2 + '\n' + 'Média: ' + m)





</script>
