<script>

/*

c) Elaborar um programa para uma loja, o qual leia o preço de um produto e
informe as opções de pagamento da loja. Calcule e informe o valor para
pagamento à vista com 10% de desconto e o valor em 3x.

Exemplo:
Preço R$: 60.00
À Vista R$: 54.00
Ou 3x de R$: 20.00
*/


var n = Number(prompt('Preço R$: '));

var a = n - (10/100 * 60);

var pt = n / 3;

window.alert ('Preço: R$' + n.toFixed(2)  + '\n' + 
            'À vista com 10% desconto: R$' + a.toFixed(2) + '\n' +
            'Parcelado em 3x: R$' + pt.toFixed(2))


</script>
