<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Olá, Você!</h1>
    <p>Nome: <input type="text" id="nome"> <input type="button" value="Mostrar"></p>
    
    <p id="resposta"></p>

    
     <script>
        function ola () {
            var nome = document.getElementById('nome').value;
            document.getElementById('resposta').textContent = 'Olá' + nome;
        }
      </script>



</body>
</html>

<!--
      EVENTOS 
      
     Evento é qualquer tipo de reação gerada no site após um click, por exemplo. Para acionar um deles, utilize "on" seguido do evento.

     Exemplo:
     (on)click, (on)change, (on)submit, (on)blur ou (on)load.

     FUNÇÕES

     São declaradas a partir da palavra chave "function" + nome da função + parentêses.

     Uma função possui um conjunto de comandos.

     Como mostrar "OLÁ" na tela com "function"


      <script>
        function ola () {
            var nome = document.getElementById('nome').value;
            document.getElementById('resposta').textContent = 'Olá' + nome;
        }
      </script>
    
      -->
